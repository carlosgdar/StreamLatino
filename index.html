<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamLatino</title>
  <style>
    :root {
      --red: #e50914;
      --black: #141414;
      --dark: #221f1f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--black);
      color: white;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      position: fixed;
      width: 100%;
      z-index: 1000;
      padding: 15px 40px;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .logo { font-size: 28px; font-weight: bold; color: var(--red); }

    .search-bar {
      flex: 1;
      max-width: 500px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 20px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444;
      border-radius: 30px;
      color: white;
      font-size: 16px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    nav a:hover { color: var(--red); }

    .user-section {
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 70px;
      width: 220px;
      height: calc(100vh - 70px);
      background: var(--dark);
      padding: 20px;
      z-index: 900;
    }
    .sidebar a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: all 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: var(--red);
    }

    .main-content {
      margin-left: 240px;
      padding: 90px 40px 40px;
    }

    .hero {
      height: 520px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://image.tmdb.org/t/p/original/8cdWjvZQUExUUTzyp4t1j4C7l9g.jpg');
      background-size: cover;
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 60px;
      margin-bottom: 40px;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-size: 26px;
      margin: 30px 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.4s ease;
      position: relative;
      animation: cardPop 0.6s ease forwards;
    }
    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 25px rgba(229, 9, 20, 0.5);
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .card:hover img { transform: scale(1.08); }

    .card-title {
      padding: 12px;
      text-align: center;
      background: #1f1f1f;
    }

    .favorite-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
    }
    .favorite-btn.active { color: #ff0000; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #221f1f;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      animation: modalPop 0.4s ease;
    }

    @keyframes modalPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .player {
      background: black;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #666;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">STREAMLATINO</div>
    
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Buscar películas, series..." onkeyup="searchContent()">
    </div>

    <nav>
      <ul>
        <li><a href="#" onclick="showSection('home')">Inicio</a></li>
        <li><a href="#" onclick="showSection('movies')">Películas</a></li>
        <li><a href="#" onclick="showSection('series')">Series</a></li>
        <li><a href="#" onclick="showSection('live')">TV en Vivo</a></li>
        <li><a href="#" onclick="showSection('favorites')">❤️ Favoritos</a></li>
      </ul>
    </nav>

    <div class="user-section" onclick="toggleProfileModal()">
      <div id="current-profile" style="font-size:18px;">Perfil 1</div>
      <div style="width:40px;height:40px;background:#666;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="#" onclick="showSection('movies')" class="active">🎬 Películas</a>
    <a href="#" onclick="showSection('series')">📺 Series</a>
    <a href="#" onclick="showSection('live')">📡 TV en Vivo</a>
    <a href="#" onclick="showSection('favorites')">❤️ Mis Favoritos</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="main-content">
    <!-- Se cargará dinámicamente -->
  </div>

  <!-- PROFILE MODAL -->
  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <h2>Perfiles</h2>
      <div id="profiles-list"></div>
      <button onclick="addNewProfile()" style="width:100%; margin-top:15px;">+ Crear Nuevo Perfil</button>
      <button onclick="toggleProfileModal()" style="width:100%; background:#555; margin-top:10px;">Cerrar</button>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal" id="detail-modal">
    <div class="modal-content" style="max-width: 800px;">
      <span onclick="closeDetail()" style="float:right; font-size:35px; cursor:pointer;">&times;</span>
      <h2 id="modal-title"></h2>
      <div class="player" id="modal-player">▶ Reproductor (Demo)</div>
      <p id="modal-overview" style="margin-top:15px; line-height:1.6;"></p>
    </div>
  </div>

  <script>
    let currentProfile = "Perfil 1";
    let favorites = [];

    const allContent = [
      {id:1, type:"movie", title:"Dune: Parte Dos", img:"https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t1j4C7l9g.jpg", overview:"La épica continuación de la saga."},
      {id:2, type:"movie", title:"Furiosa", img:"https://image.tmdb.org/t/p/w500/9xtoB7gZ8t6Q3yF6Q2z0.jpg", overview:"La historia de Furiosa antes de conocer a Max."},
      {id:3, type:"movie", title:"Deadpool & Wolverine", img:"https://image.tmdb.org/t/p/w500/8b8R8l88Qje9dn9d7Z0k6Yk1zQ.jpg", overview:"La pareja más esperada del cine."},
      {id:4, type:"series", title:"The Boys", img:"https://image.tmdb.org/t/p/w500/5z0p4u5Xz1Z3Xz.jpg", overview:"Superhéroes corruptos."},
      {id:5, type:"series", title:"House of the Dragon", img:"https://image.tmdb.org/t/p/w500/6o0aZfZ1Z2Z3Z4Z5Z.jpg", overview:"La precuela de Game of Thrones."}
    ];

    function renderGrid(content) {
      const grid = document.createElement('div');
      grid.className = 'grid';
      
      content.forEach(item => {
        const isFav = favorites.some(f => f.id === item.id);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${item.img}" alt="${item.title}">
          <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, ${item.id})">❤️</button>
          <div class="card-title">${item.title}</div>
        `;
        card.onclick = (e) => {
          if (!e.target.classList.contains('favorite-btn')) {
            showDetail(item);
          }
        };
        grid.appendChild(card);
      });
      return grid;
    }

    function toggleFavorite(e, id) {
      e.stopPropagation();
      const item = allContent.find(c => c.id === id);
      const index = favorites.findIndex(f => f.id === id);
      
      if (index === -1) {
        favorites.push(item);
      } else {
        favorites.splice(index, 1);
      }
      showSection('favorites'); // Actualiza si estás en favoritos
      showSection(document.querySelector('.sidebar a.active').textContent.includes('Películas') ? 'movies' : 'series');
    }

    function searchContent() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allContent.filter(item => 
        item.title.toLowerCase().includes(query)
      );
      
      const main = document.getElementById('main-content');
      main.innerHTML = `<h2 class="section-title">Resultados de búsqueda</h2>`;
      main.appendChild(renderGrid(filtered));
    }

    function showDetail(item) {
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-overview').textContent = item.overview;
      document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeDetail() {
      document.getElementById('detail-modal').style.display = 'none';
    }

    function toggleProfileModal() {
      const modal = document.getElementById('profile-modal');
      const list = document.getElementById('profiles-list');
      list.innerHTML = `
        <p><strong>Perfil actual:</strong> ${currentProfile}</p>
        <button onclick="switchProfile('Perfil 1')" style="margin:5px;">Perfil 1</button>
        <button onclick="switchProfile('Carlos')" style="margin:5px;">Carlos</button>
      `;
      modal.style.display = 'flex';
    }

    function switchProfile(name) {
      currentProfile = name;
      document.getElementById('current-profile').textContent = name;
      toggleProfileModal();
    }

    function addNewProfile() {
      const name = prompt("Nombre del nuevo perfil:");
      if (name) {
        alert(`Perfil "${name}" creado (Demo)`);
        switchProfile(name);
      }
    }

    function showSection(section) {
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      
      const main = document.getElementById('main-content');
      
      if (section === 'favorites') {
        main.innerHTML = `<h2 class="section-title">❤️ Mis Favoritos</h2>`;
        if (favorites.length === 0) {
          main.innerHTML += `<p style="color:#666; text-align:center; padding:50px;">No tienes favoritos aún. ❤️ Agrega algunos!</p>`;
        } else {
          main.appendChild(renderGrid(favorites));
        }
      } else if (section === 'live') {
        main.innerHTML = `
          <h2 class="section-title">📡 TV en Vivo - Canales Latinos</h2>
          <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px;">
            <div style="background:#1f1f1f; padding:20px; border-radius:10px; text-align:center;">
              <h3>Univision</h3><div class="player">EN VIVO</div>
            </div>
            <div style="background:#1f1f1f; padding:20px; border-radius:10px; text-align:center;">
              <h3>Telemundo</h3><div class="player">EN VIVO</div>
            </div>
          </div>
        `;
      } else {
        const title = section === 'movies' ? '🎬 Películas' : '📺 Series';
        main.innerHTML = `<h2 class="section-title">${title}</h2>`;
        main.appendChild(renderGrid(allContent.filter(c => section === 'movies' ? c.type === 'movie' : c.type === 'series')));
      }
    }

    // Inicializar
    window.onload = () => {
      showSection('movies');
    };
  </script>
</body>
</html>
